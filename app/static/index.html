<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lecture</title>
  <meta name="description" content="PDF to audio — self-hosted">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lecture">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <link rel="manifest" href="/manifest.json?v=5">
  <link rel="stylesheet" href="/style.css?v=5">
  <!-- Apply saved theme before render to avoid flash -->
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div id="offline-banner" class="offline-banner hidden">
    Server unreachable — showing last known state
  </div>

  <header class="app-header">
    <div class="header-inner">
      <span class="app-title">Lecture</span>
      <div class="header-actions">
        <div class="theme-switcher" role="group" aria-label="Theme">
          <button class="theme-btn" id="theme-system" data-theme="" title="System theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          </button>
          <button class="theme-btn" id="theme-light" data-theme="light" title="Light theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button class="theme-btn" id="theme-dark" data-theme="dark" title="Dark theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
        <button class="btn-primary" id="btn-upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload PDF
        </button>
      </div>
    </div>
  </header>

  <main class="main-content" id="main">
    <div id="job-counter" class="job-counter hidden"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <p>No jobs yet.<br>Upload a PDF to get started.</p>
    </div>
    <ul class="job-list" id="job-list"></ul>
  </main>

  <!-- Upload modal -->
  <div class="modal-backdrop hidden" id="upload-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New job</h2>
        <button class="btn-icon" id="btn-close-upload" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="drop-zone" id="drop-zone" tabindex="0" role="button" aria-label="Choose PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span id="drop-label">Tap to choose a PDF</span>
        <input type="file" id="file-input" accept=".pdf,application/pdf" hidden>
      </div>

      <div class="form-group">
        <label for="lang-select">Language</label>
        <select id="lang-select" class="select">
          <option value="ro">Romanian (ro)</option>
          <option value="en">English (en)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="voice-select">Voice</label>
        <div class="voice-row">
          <select id="voice-select" class="select">
            <option value="" disabled selected>— select a voice —</option>
          </select>
          <button type="button" class="btn-sample" id="btn-sample" aria-label="Play voice sample" title="Play sample">
            <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><polygon points="6 4 20 12 6 20 6 4"/></svg>
            <svg class="ic-stop hidden" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
          </button>
        </div>
        <audio id="sample-audio" preload="none"></audio>
      </div>

      <div id="upload-error" class="form-error hidden"></div>

      <button class="btn-primary btn-block" id="btn-submit" disabled>
        Start
      </button>
    </div>
  </div>

  <script src="/app.js?v=5"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // updateViaCache:"none" forces the browser to revalidate sw.js every time,
      // so new versions are picked up instead of being stuck behind HTTP cache.
      navigator.serviceWorker.register("/sw.js", { updateViaCache: "none" });
      // When a new worker takes control, reload once to swap in fresh assets.
      let reloading = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (reloading) return;
        reloading = true;
        location.reload();
      });
    }
  </script>
</body>
</html>
